<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Landmark Detection</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        background-color: #b9b2b2;
      }

      h1 {
        font-family: "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        font-size: 46px;
        text-align: center;
        margin-bottom: 20px;
        font-weight: bolder;
        border: 5px solid black;
        width: 800px;
        height: 80px;
        margin: 20px;
        padding: 10px;
        background-color: aqua;
      }

      #videoContainer {
        position: relative;
        width: 480px;
        height: 360px;
        margin-bottom: 20px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        background-color: black;
      }

      video,
      canvas {
        border: 4px solid #217fea;
        border-radius: 15px;
        width: 100%;
        height: 100%;
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        box-shadow: inset;
      }

      canvas {
        pointer-events: none;
      }

      #webcamButton {
        cursor: pointer;
        border-radius: 50px;
        background-color: #073f7f;
        color: #fff;
        border: 4px solid rgb(0, 0, 59);
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        width: 300px;
        margin: 20px 0;
        transition: background-color 0.3s;
      }

      #webcamButton:hover {
        background-color: #1277c5;
      }

      #livenessPrompt {
        font-size: 36px;
        font-weight: bold;
        color: green;
        text-align: center;
        margin-top: 20px;
      }

      #results {
        text-align: center;
        margin-top: 10px;
      }

      .blendshapes {
        margin-top: 200px;
      }

      .blend-shape-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 20px;
      }

      .blend-shape {
        justify-content: space-between;
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
        transition: transform 0.3s;
      }

      .blend-shape:hover {
        transform: scale(1.02);
      }

      #landmarksList {
        margin-top: 20px;
      }

      ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }

      li {
        margin: 5px 0;
      }

      .name {
        font-weight: bold;
      }

      .value {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>Face Liveliness Detection</h1>
    <div id="livenessPrompt"></div>
    <div id="results"></div>

    <div id="videoContainer">
      <video id="webcam" autoplay muted></video>
      <canvas id="output_canvas"></canvas>
    </div>

    <button id="webcamButton">CHECK LIVELINESS</button>

    <h2 class="blendshapes">Blend Shapes</h2>
    <div class="blend-shape-grid" id="blendShapesList"></div>

    <h2>Landmarks</h2>
    <ul id="landmarksList"></ul>

    <script type="module">
      import vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

      const { FaceLandmarker, FilesetResolver, DrawingUtils } = vision;

      let faceLandmarker;
      let runningMode = "VIDEO";
      let webcamRunning = false;
      let timeoutId; // Declare timeoutId to store the setTimeout reference
      let actionsToDetect = []; // The queue of actions to detect
      let currentActionIndex = 0; // Track the current action
      let actionDetected = false; // Track if the action was detected within 3 seconds

      async function createFaceLandmarker() {
        const filesetResolver = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(
          filesetResolver,
          {
            baseOptions: {
              modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
              delegate: "GPU",
            },
            outputFaceBlendshapes: true,
            runningMode,
            numFaces: 1,
          }
        );
        console.log("Face Landmarker created");
      }
      createFaceLandmarker();

      const video = document.getElementById("webcam");
      const canvasElement = document.getElementById("output_canvas");
      const canvasCtx = canvasElement.getContext("2d");
      const landmarksList = document.getElementById("landmarksList");
      const blendShapesList = document.getElementById("blendShapesList");
      const livenessPrompt = document.getElementById("livenessPrompt"); // Reference to the liveness prompt
      const resultMessage = document.getElementById("results"); // Reference to the result message
      let lastVideoTime = -1;
      let results = undefined;
      const drawingUtils = new DrawingUtils(canvasCtx);

      function hasGetUserMedia() {
        return !!(
          navigator.mediaDevices && navigator.mediaDevices.getUserMedia
        );
      }

      if (hasGetUserMedia()) {
        const enableWebcamButton = document.getElementById("webcamButton");
        enableWebcamButton.addEventListener("click", enableCam);
      } else {
        console.warn("getUserMedia() is not supported by your browser");
      }

      function enableCam(event) {
        webcamRunning = !webcamRunning;
        const enableWebcamButton = event.target;
        enableWebcamButton.innerText = webcamRunning
          ? "DISABLE CHECKING"
          : "CHECK LIVELINESS";

        const constraints = {
          video: true,
        };

        if (webcamRunning) {
          navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
            startLivenessCheck(); // Start the liveness action sequence
          });
        } else {
          clearTimeout(timeoutId); // Clear the timeout if predictions are disabled
          video.srcObject.getTracks().forEach((track) => track.stop()); // Stop the video stream
        }
      }

      async function predictWebcam() {
        const videoWidth = 480;
        const radio = video.videoHeight / video.videoWidth;
        video.style.width = videoWidth + "px";
        video.style.height = videoWidth * radio + "px";
        canvasElement.width = video.videoWidth;
        canvasElement.height = video.videoHeight;

        if (lastVideoTime !== video.currentTime) {
          lastVideoTime = video.currentTime;
          results = faceLandmarker.detectForVideo(video, performance.now());
        }

        if (results.faceLandmarks) {
          landmarksList.innerHTML = ""; // Clear previous results
          for (const landmarks of results.faceLandmarks) {
            drawingUtils.drawConnectors(
              landmarks,
              FaceLandmarker.FACE_LANDMARKS_TESSELATION,
              { color: "#C0C0C070", lineWidth: 1 }
            );

            landmarks.forEach((landmark, index) => {
              const li = document.createElement("li");
              li.innerText = `Landmark ${index}: (${landmark.x.toFixed(
                2
              )}, ${landmark.y.toFixed(2)})`;
              landmarksList.appendChild(li);
            });
          }
        }

        checkForAction(results.faceBlendshapes); // Check if the user performs the requested action
        if (webcamRunning) {
          window.requestAnimationFrame(predictWebcam);
        }
      }

      function drawBlendShapes(blendShapes) {
        blendShapesList.innerHTML = ""; // Clear previous results
        livenessPrompt.innerText = ""; // Clear previous liveness prompt

        if (!blendShapes || blendShapes.length === 0) {
          return;
        }

        const blendShapeValues = blendShapes[0].categories;
        blendShapeValues.forEach((shape, index) => {
          const blendShapeElement = document.createElement("div");
          blendShapeElement.className = "blend-shape";
          blendShapeElement.innerHTML = `<span class="name">Blend ${
            index + 1
          }: </span><span class="value">${(shape.score * 100).toFixed(
            2
          )}%</span>`;
          blendShapesList.appendChild(blendShapeElement);
        });
      }

     // Define the liveness actions (smile, tongue out, head movement, wink, pout, show teeth)
const actions = [
  { name: "Smile", index1: 44, index2: 45, threshold: 0.5 }, // Smile
  { name: "Show your tongue", index: 25, threshold: 0.3 }, // Tongue out
  { name: "Move your head", index1: 12, index2: 13, threshold: 0.6 }, // Head movement (eyebrows)
  { name: "Pout", index: 39, threshold: 0.9 }, // Pout
  { name: "Show Teeth", indices: [35, 36, 49, 50], threshold: 0.4 }, // Show Teeth
  {name: "Raise Eyebrows", indices: [4,5], threshold: 0.7 }

];
function getRandomActions(actions) {
  const shuffled = actions.sort(() => 0.5 - Math.random()); // Shuffle the actions
  return shuffled.slice(0, 3); // Return the first three actions
}
// Start the sequence of liveness checks
function startLivenessCheck() {
  //actionsToDetect = [...actions]; // Clone the actions
  actionsToDetect=getRandomActions(actions);
currentActionIndex = 0;
  promptNextAction(); // Prompt the first action
}

// Prompt the next action in the sequence
function promptNextAction() {
  if (currentActionIndex >= actionsToDetect.length) {
    livenessPrompt.innerText = "Liveness Detected!";
    resultMessage.innerText = "All actions completed successfully!";
    return;
  }

  const action = actionsToDetect[currentActionIndex];
  livenessPrompt.innerText = `Please ${action.name}!`;
  actionDetected = false;

  timeoutId = setTimeout(() => {
    if (!actionDetected) {
      disablePredictions(false); // If the action is not detected within time, fail
    }
  }, 3000); // 3 seconds to perform the action
}

// Check for the current action
function checkForAction(blendShapes) {
  if (!blendShapes || !blendShapes.length) return;

  const action = actionsToDetect[currentActionIndex];

  // Check for smile detection (blendshape 44 and 45)
  if (action.name === "Smile") {
    const smileScore = blendShapes[0].categories[44].score;
    if (smileScore > action.threshold) {
      actionDetected = true;
      proceedToNextAction();
    }
  }

  // Check for tongue detection (blendshape 25)
  if (action.name === "Show your tongue") {
    const tongueScore = blendShapes[0].categories[25].score;
    if (tongueScore > action.threshold) {
      actionDetected = true;
      proceedToNextAction();
    }
  }

  // Check for head movement detection (blendshape 12 and 13)
  if (action.name === "Move your head") {
    const eyebrowLeft = blendShapes[0].categories[12].score;
    const eyebrowRight = blendShapes[0].categories[13].score;
    if (
      eyebrowLeft > action.threshold ||
      eyebrowRight > action.threshold
    ) {
      actionDetected = true;
      proceedToNextAction();
    }
  }


  // Check for pout detection (blendshape 38)
  if (action.name === "Pout") {
    const poutScore = blendShapes[0].categories[38].score;
    if (poutScore > action.threshold) {
      actionDetected = true;
      proceedToNextAction();
    }
  }
 // Check for eyebrow detection (blendshape 4 and 5)
  if (action.name === "Raise Eyebrows") {
    const lefteyebrowScore = blendShapes[0].categories[4].score;
	const righteyebrowScore = blendShapes[0].categories[5].score;
    if (lefteyebrowScore > action.threshold || righteyebrowScore > action.threshold) {
      actionDetected = true;
      proceedToNextAction();
    }
  }

  // Check for show teeth detection (blendshapes 34,35, 48, 49)
  if (action.name === "Show Teeth") {
    const teethScores = [
      blendShapes[0].categories[34].score,
      blendShapes[0].categories[35].score,
      blendShapes[0].categories[49].score,
      blendShapes[0].categories[48].score
      
    ];
    const allTeethDetected = teethScores.every(score => score > action.threshold);
    if (allTeethDetected) {
      actionDetected = true;
      proceedToNextAction();
    }
  }
}

// Move to the next action or end the sequence
function proceedToNextAction() {
  clearTimeout(timeoutId); // Clear the previous timeout
  currentActionIndex++;
  promptNextAction(); // Prompt the next action
}

      // Disable webcam predictions and stop the stream
      function disablePredictions(success) {
        webcamRunning = false;
        document.getElementById("webcamButton").innerText = "CHECK LIVELINESS"; // Update button text
        video.srcObject.getTracks().forEach((track) => track.stop()); // Stop the video stream

        if (success === false) {
          livenessPrompt.innerText = "Liveness Not Detected!";
          resultMessage.innerText = "Action not completed in time.";
          livenessPrompt.style.color = "red";
          resultMessage.style.color = "red";
          resultMessage.style.fontSize = "28px";
        }
      }
    </script>
  </body>
</html>
